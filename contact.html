    <script>
        (function () {
            var shouldSkipLoader = false;

            try {
                shouldSkipLoader = sessionStorage.getItem('portfolioSkipLoader') === '1';
                sessionStorage.removeItem('portfolioSkipLoader');
            } catch (error) {
            }

            try {
                if (!shouldSkipLoader && document.referrer) {
                    var previousPage = new URL(document.referrer);
                    shouldSkipLoader = previousPage.origin === window.location.origin;
                }
            } catch (error) {
            }

            if (!shouldSkipLoader) {
                document.documentElement.classList.add('show-loader');
            }
        }());
    </script>

                <form id="contact-form" class="contact-form" action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="34cc6edd-2e76-444b-b0a5-cb0fca90d91c">
                    <input type="hidden" name="subject" value="New portfolio message from Kiel Portfolio">
                    <input type="checkbox" name="botcheck" class="hidden-field" tabindex="-1" autocomplete="off">

                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" placeholder="Your name" required>

                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="your@email.com" required>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message" required></textarea>

                    <button type="submit">Send Message</button>
                    <p class="form-status" id="form-status" role="status"></p>
                </form>
